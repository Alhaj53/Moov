<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,sans-serif;}

body{
min-height:100vh;
padding:20px;
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
display:flex;
justify-content:center;
align-items:center;
}

body::before,body::after{
content:"";
position:fixed;
border-radius:50%;
filter:blur(80px);
pointer-events:none;
}

body::before{
width:260px;height:260px;background:#06b6d4;
top:-80px;right:-80px;opacity:.25;
}

body::after{
width:300px;height:300px;background:#8b5cf6;
bottom:-100px;left:-100px;opacity:.25;
}

.box{
width:100%;
max-width:500px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.12);
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.userBox{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
transform:scale(.9);
transform-origin:right center;
}

.avatar{
width:50px;height:50px;border-radius:50%;
background:linear-gradient(90deg,#06b6d4,#8b5cf6);
display:flex;align-items:center;justify-content:center;
font-size:20px;font-weight:bold;color:white;
}

.userInfo{color:white;}
.userInfo h3{font-size:16px;margin-bottom:2px;}
.userInfo p{font-size:12px;color:#cbd5e1;}

.pointsCard{
text-align:center;
padding:18px;
border-radius:20px;
background:rgba(255,255,255,.06);
margin-bottom:18px;
}

.pointsLabel{color:#cbd5e1;font-size:13px;margin-bottom:8px;}

.points{
font-size:38px;
font-weight:bold;
color:white;
}

.rechargeBtn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#06b6d4,#8b5cf6);
margin-top:15px;
}

.offers{
margin-top:15px;
display:none;
gap:10px;
}

.offer{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:12px;
color:white;
text-align:center;
}

.sectionTitle{
margin:20px 0 12px;
color:white;
font-size:18px;
font-weight:bold;
text-align:center;
}

.input-group{margin-bottom:18px;}

label{
display:block;
margin-bottom:8px;
color:#cbd5e1;
font-size:14px;
}

input{
width:100%;
padding:18px;
font-size:20px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.12);
color:white;
outline:none;
text-align:center;
}

input::placeholder{color:#94a3b8;}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.actionBtn{
padding:18px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#06b6d4,#8b5cf6);
}

.notice{
margin-top:15px;
padding:12px;
border-radius:12px;
background:rgba(250,204,21,.12);
border:1px solid rgba(250,204,21,.3);
color:#fde68a;
font-size:13px;
text-align:center;
}

#response{
margin-top:15px;
display:none;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}
</style>
</head>
<body>

<div class="box">

<div class="userBox">
<div class="avatar">م</div>
<div class="userInfo">
<h3 id="username">اسم المستخدم</h3>
<p>الحساب الأساسي</p>
</div>
</div>

<div class="pointsCard">
<div class="pointsLabel">رصيد النقاط</div>
<div class="points" id="points">0</div>

<button class="rechargeBtn" onclick="toggleOffers()">
إعادة شحن النقاط
</button>

<div class="offers">
<div class="offer">30 نقطة مقابل 5 MRU</div>
<div class="offer">50 نقطة مقابل 10 MRU</div>
<div class="offer">300 نقطة مقابل 20 MRU</div>
</div>
</div>

<div class="sectionTitle">خدمات الأرقام</div>

<div class="input-group">
<label>رقم الهاتف</label>
<input id="phone" maxlength="8" placeholder="4xxxxxxx">
</div>

<div class="actions">
<button class="actionBtn" id="balanceBtn" onclick="getBalance()">
<span id="balanceText">معرفة الرصيد</span>
</button>
<button class="actionBtn" id="nameBtn" onclick="getName()">
معرفة الاسم المسجل
</button>
</div>

<div class="notice">
سيتم خصم نقطة واحدة من رصيدك مقابل كل عملية استخدام لأي خدمة.
</div>

<div id="response"></div>

</div>

<script>
function toggleOffers(){
const offers=document.querySelector(".offers");
offers.style.display=offers.style.display==="grid"?"none":"grid";
}

async function loadDashboard() {
const token = localStorage.getItem("token");

if (!token) {
window.location.href = "/";
return;
}

const r = await fetch("/api/token-login", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({ token })
});

const data = await r.json();

if (data.status === "success") {
const user = data.user;
document.getElementById("username").innerText = user.username;
document.getElementById("points").innerText = user.points;
document.querySelector(".avatar").innerText = user.username.charAt(0);
} else {
localStorage.removeItem("token");
window.location.href = "/";
}
}

loadDashboard();

window.addEventListener("load",()=>{
document.getElementById("phone").focus();
});
async function getBalance(){

const btn = document.getElementById("balanceBtn");
const text = document.getElementById("balanceText");

btn.disabled = true;
text.innerHTML = "جاري التحميل ⏳";

const token = localStorage.getItem("token");
const phone = document.getElementById("phone").value.trim();

if(!phone){
alert("أدخل رقم الهاتف");
btn.disabled = false;
text.innerHTML = "معرفة الرصيد";
return;
}

try{

const r = await fetch("/balance",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone: phone,
token: token
})
});

const data = await r.json();

if(data.status !== "success"){
alert(data.error || "فشل العملية");
return;
}

// تحديث النقاط
if(data.points !== undefined){
document.getElementById("points").innerText = data.points;
}

// عرض الرصيد
let html = "";

data.result.forEach(item => {

item = item
.replace(/\s+/g, ' ')
.replace(/(\d+)\s+GB/, '$1GB')
.replace(/(\d+)\s+MB/, '$1MB')
.replace(/(\d+)\s+KB/, '$1KB');

html += `
<div style="
background:rgba(255,255,255,0.06);
padding:10px;
margin-bottom:8px;
border-radius:10px;
font-size:14px;
line-height:1.6;
">
${item}
</div>`;
});

document.getElementById("balanceResult").innerHTML = html;
document.getElementById("balanceModal").style.display = "flex";

}catch(e){
alert("خطأ في الاتصال");
}finally{
btn.disabled = false;
text.innerHTML = "معرفة الرصيد";
}
}

function closeBalance(){
document.getElementById("balanceModal").style.display="none";
}

async function getName(){

const token = localStorage.getItem("token");
const phone = document.getElementById("phone").value.trim();

if(!phone){
alert("أدخل رقم الهاتف");
return;
}

try{

const r = await fetch("/name", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
phone: phone,
token: token
})
});

const data = await r.json();

if(data.status !== "success"){
alert(data.error || "فشل العملية");
return;
}

document.getElementById("balanceResult").innerHTML = `
<div style="
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:10px;
font-size:18px;
text-align:center;
">
${data.name}
</div>
`;

document.getElementById("points").innerText = data.points;
document.getElementById("balanceModal").style.display = "flex";

}catch(e){
alert("خطأ في الاتصال");
}

}
</script>
<div id="balanceModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
width:92%;
max-width:520px;
background:#0f172a;
border:1px solid rgba(255,255,255,0.15);
border-radius:18px;
padding:20px;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
">

<h3 style="
text-align:center;
margin-bottom:15px;
color:#06b6d4;
font-size:20px;
">
تفاصيل الرصيد
</h3>

<div id="balanceResult" style="
max-height:350px;
overflow:auto;
font-size:15px;
line-height:1.8;
text-align:right;
"></div>

<button onclick="closeBalance()" style="
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#06b6d4,#8b5cf6);
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
">
إغلاق
</button>

</div>
</div>
</body>
</html>
